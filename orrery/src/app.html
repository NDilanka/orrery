<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orrery</title>
    <meta name="color-scheme" content="dark light" />
    <script>
      // FOUC guard (WS-C): stamp data-theme on <html> BEFORE first paint so the
      // light-theme token overrides (tokens.css) apply synchronously and there's no
      // dark→light flash. WS-A mirrors settings to localStorage['orrery.settings'] in
      // ALL modes (incl. Tauri) precisely so this can read it without awaiting the store.
      // Fails safe to dark on any error (parse failure, unavailable storage, etc).
      (function () {
        try {
          var raw = localStorage.getItem('orrery.settings');
          var appearance = raw ? JSON.parse(raw).appearance || {} : {};
          var theme = appearance.theme || 'dark';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = theme === 'light' ? 'light' : 'dark';
          // density before first paint too, so compact chrome doesn't reflow (WS-A)
          if (appearance.density === 'compact') {
            document.documentElement.dataset.density = 'compact';
          }
          // motion as well: a user-forced 'reduced' (or forced 'full' under OS-reduce)
          // must hold from the first frame; absent = system (CSS media query decides).
          if (appearance.motion === 'reduced' || appearance.motion === 'full') {
            document.documentElement.dataset.motion = appearance.motion;
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
