name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine (py3.11 / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install engine (with dev extras)
        run: pip install -e "./engine[dev]"

      - name: Lint (ruff)
        run: ruff check engine

      - name: Tests (pytest)
        run: pytest engine/tests -q

  orrery:
    name: orrery (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orrery/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            orrery/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('orrery/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - name: Install JS deps
        working-directory: orrery
        run: npm ci

      - name: Type-check (svelte-check)
        working-directory: orrery
        run: npm run check

      - name: Frontend unit tests (vitest — includes TS reducer golden parity)
        working-directory: orrery
        run: npm run test:unit

      - name: Rust tests (cargo test)
        run: cargo test --manifest-path orrery/src-tauri/Cargo.toml
